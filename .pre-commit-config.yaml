# Local guard so commit messages follow Conventional Commits before they ever reach
# CI. Pure-Python (no node), so it sidesteps local node/nvm issues.
# One-time setup:  pip install pre-commit && pre-commit install --hook-type commit-msg
repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
