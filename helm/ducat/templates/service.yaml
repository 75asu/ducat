{{- if eq .Values.mode "serve" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ducat.fullname" . }}
  labels:
    {{- include "ducat.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ducat.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.serve.port }}
      targetPort: http
{{- end }}
