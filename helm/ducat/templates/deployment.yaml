{{- if eq .Values.mode "serve" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ducat.fullname" . }}
  labels:
    {{- include "ducat.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ducat.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ducat.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ toYaml .Values.config | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ducat.serviceAccountName" . }}
      containers:
        - name: ducat
          image: {{ include "ducat.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --config
            - /etc/ducat/config.yaml
            - --port
            - {{ .Values.serve.port | quote }}
            - --interval
            - {{ .Values.serve.refreshInterval | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.serve.port }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 15
          volumeMounts:
            - name: config
              mountPath: /etc/ducat
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ducat.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
