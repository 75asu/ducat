name: Commit lint

# Hard gate: every commit in a PR must follow Conventional Commits, so release-please
# can derive the version + changelog. Reads .commitlintrc.yaml.
on:
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
