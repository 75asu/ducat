{{- if and (eq .Values.mode "serve") .Values.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ducat.fullname" . }}
  labels:
    {{- include "ducat.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ducat.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
      # ducat's own labels (provider, service, billing_account) must win over the
      # target labels the Prometheus Operator stamps , notably `service`, which
      # would otherwise be overwritten by the Kubernetes Service name and collapse
      # every provider's per-service breakdown into one bucket.
      honorLabels: {{ .Values.serviceMonitor.honorLabels }}
{{- end }}
