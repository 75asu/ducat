name: Release

# Fully automated, set-and-forget. Conventional commits land on main; release-please
# opens/updates a "Release PR" (changelog + version bump in pyproject, __init__,
# Chart.yaml). Merging that PR is the ONLY human step: it tags + creates the GitHub
# Release, then the publish job pushes the image and the Helm chart. Never edit
# versions or tags by hand. Graduate to prod with a commit footer "Release-As: 1.0.0".
#
# workflow_dispatch(publish_tag) is an escape hatch to re-publish artifacts for an
# existing tag (e.g. if a publish step failed).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: "Re-publish image + chart for an existing tag, e.g. v0.1.0"
        required: true

permissions:
  contents: write       # release-please: commits, tags, releases
  pull-requests: write  # release-please: the Release PR
  packages: write       # publish: GHCR image + chart

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: |
      always() &&
      (needs.release-please.outputs.release_created == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.publish_tag }}

      - name: Resolve version + image tags
        id: v
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag_name || inputs.publish_tag }}"
          VERSION="${TAG#v}"
          IMG="ghcr.io/${{ github.repository }}"
          TAGS="$IMG:$VERSION"
          # stable releases also move latest + major.minor; pre-releases get version only
          if ! echo "$VERSION" | grep -qE '-'; then
            TAGS="$TAGS,$IMG:${VERSION%.*},$IMG:latest"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.v.outputs.tags }}

      - name: Package + push Helm chart (OCI)
        shell: bash
        run: |
          helm package helm/ducat
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          helm push "ducat-${{ steps.v.outputs.version }}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
